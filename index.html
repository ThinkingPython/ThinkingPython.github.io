<!DOCTYPE html>
<html>
<head>
    <title>Timetable</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Timetable</h1>

    <table>
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>
        <tr>
            <td>09:00 - 10:00</td>
            <td>Math</td>
            <td>Science</td>
            <td>English</td>
            <td>History</td>
            <td>Art</td>
        </tr>
        <tr>
            <td>10:00 - 11:00</td>
            <td>Science</td>
            <td>English</td>
            <td>History</td>
            <td>Art</td>
            <td>Math</td>
        </tr>
        <tr>
            <td>11:00 - 12:00</td>
            <td>English</td>
            <td>History</td>
            <td>Art</td>
            <td>Math</td>
            <td>Science</td>
        </tr>
        <tr>
            <td>12:00 - 13:00</td>
            <td>History</td>
            <td>Art</td>
            <td>Math</td>
            <td>Science</td>
            <td>English</td>
        </tr>
        <tr>
            <td>13:00 - 14:00</td>
            <td>Art</td>
            <td>Math</td>
            <td>Science</td>
            <td>English</td>
            <td>History</td>
        </tr>
        <!-- Add more rows for each time slot -->
    </table>
</body>
</html>
