<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      text-align: center;
    }
    
    .todo-list {
      list-style-type: none;
      padding: 0;
    }
    
    .todo-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      background-color: #f9f9f9;
      border-radius: 5px;
      padding: 10px;
    }
    
    .todo-item input[type="checkbox"] {
      margin-right: 10px;
    }
    
    .todo-item label {
      flex-grow: 1;
      cursor: pointer;
    }
    
    .todo-item button {
      padding: 5px 10px;
      background-color: #f44336;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .todo-item button:hover {
      background-color: #d32f2f;
    }
    
    .add-todo {
      display: flex;
      align-items: center;
      margin-top: 20px;
    }
    
    .add-todo input[type="text"] {
      flex-grow: 1;
      padding: 5px;
      border: none;
      border-radius: 3px;
    }
    
    .add-todo button {
      margin-left: 10px;
      padding: 5px 10px;
      background-color: #4caf50;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .add-todo button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <ul class="todo-list">
      <li class="todo-item">
        <input type="checkbox">
        <label>Example Todo Item</label>
        <button>Delete</button>
      </li>
    </ul>
    <div class="add-todo">
      <input type="text" placeholder="Add new todo">
      <button>Add</button>
    </div>
  </div>
</body>
</html>
